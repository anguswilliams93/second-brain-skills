<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%"  stop-color="#113a33"/>
      <stop offset="55%" stop-color="#0d2e28"/>
      <stop offset="100%" stop-color="#0a231e"/>
    </radialGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0d8070"/>
      <stop offset="50%" stop-color="#2aa08a"/>
      <stop offset="100%" stop-color="#4dd4c6"/>
    </linearGradient>
    <style>
      .h1   { font-family:'Inter Tight','Inter',system-ui,sans-serif; font-weight:500; letter-spacing:-0.035em; fill:#ffffff; }
      .h2   { font-family:'Inter Tight','Inter',system-ui,sans-serif; font-weight:500; letter-spacing:-0.03em;  fill:#ffffff; }
      .h3   { font-family:'Inter Tight','Inter',system-ui,sans-serif; font-weight:500; letter-spacing:-0.015em; fill:#ffffff; }
      .body { font-family:'Inter','Inter Tight',system-ui,sans-serif; font-weight:400; letter-spacing:-0.003em; fill:#a1e8d9; }
      .caption { font-family:'Inter','Inter Tight',system-ui,sans-serif; font-weight:400; fill:#a1e8d9; opacity:0.85; }
      .mono   { font-family:'Geist Mono','JetBrains Mono',ui-monospace,monospace; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; fill:#a1e8d9; }
      .metric { font-family:'Inter Tight',sans-serif; font-weight:500; letter-spacing:-0.04em; }
      .emph   { font-style:italic; fill:url(#brandGrad); }
      .arrow  { font-family:'Inter Tight',sans-serif; font-weight:500; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- decorative corner grid (top-right) -->
  <g transform="translate(960,72)" opacity="0.35">
    <rect x="0"  y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="0"  y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="0"  y="32" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="32" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="32" width="10" height="10" rx="2" fill="#165046"/>
  </g>

  <!-- wordmark + mark -->
  <g transform="translate(64,72)">
    <g transform="scale(1.23)">
      <rect x="0"   y="0"   width="7" height="7" rx="1.6" fill="#165046"/>
      <rect x="9.5" y="0"   width="7" height="7" rx="1.6" fill="#165046"/>
      <rect x="19"  y="0"   width="7" height="7" rx="1.6" fill="#6ffce0"/>
      <rect x="0"   y="9.5" width="7" height="7" rx="1.6" fill="#165046"/>
      <rect x="9.5" y="9.5" width="7" height="7" rx="1.6" fill="#2dd4aa"/>
      <rect x="19"  y="9.5" width="7" height="7" rx="1.6" fill="#1a8a7d"/>
      <rect x="0"   y="19"  width="7" height="7" rx="1.6" fill="#2dd4aa"/>
      <rect x="9.5" y="19"  width="7" height="7" rx="1.6" fill="#6ffce0"/>
      <rect x="19"  y="19"  width="7" height="7" rx="1.6" fill="#4df4d4"/>
    </g>
    <text x="48" y="28" font-family="'Inter Tight',sans-serif" font-weight="700" font-size="26" letter-spacing="-0.02em">
      <tspan fill="#ffffff">Block</tspan><tspan fill="#4dd4c6">Score</tspan>
    </text>
  </g>

  <!-- header -->
  <g transform="translate(64,180)">
    <rect x="0" y="0" width="280" height="32" rx="16" fill="#15473e"/>
    <text x="140" y="20" class="mono" font-size="12" text-anchor="middle">MAY 2026 · BUDGET vs REALITY</text>

    <text x="0" y="92"  class="h1" font-size="60">Policy says one thing.</text>
    <text x="0" y="156" class="h1" font-size="60">The <tspan class="emph">numbers</tspan> say another.</text>

    <text x="0" y="208" class="body" font-size="20">March 2026 ABS data shows the gap between Canberra's housing narrative</text>
    <text x="0" y="234" class="body" font-size="20">and the conditions Australian renters, buyers, and owners actually face.</text>
  </g>

  <!-- ============== Stats grid 2x2 (y 460..820) ============== -->

  <!-- Card 1: Inflation -->
  <g transform="translate(64,460)">
    <rect width="464" height="200" rx="16" fill="#113a33" stroke="#165046"/>
    <text x="28" y="44" class="mono" font-size="13">HEADLINE INFLATION</text>
    <text x="28" y="124" class="metric" font-size="72" fill="#6ffce0">▲ 4.6%</text>
    <text x="28" y="158" class="body" font-size="17">Highest since 2023 — fuel &amp; housing led the surge.</text>
    <text x="28" y="182" class="caption" font-size="13" opacity="0.75">annual, ABS CPI · March 2026</text>
  </g>

  <!-- Card 2: Building approvals -->
  <g transform="translate(552,460)">
    <rect width="464" height="200" rx="16" fill="#113a33" stroke="#165046"/>
    <text x="28" y="44" class="mono" font-size="13">DWELLING APPROVALS</text>
    <text x="28" y="124" class="metric" font-size="72" fill="#4dd4c6">▼ −10.5%</text>
    <text x="28" y="158" class="body" font-size="17">Multi-unit pullback — federal target slipping.</text>
    <text x="28" y="182" class="caption" font-size="13" opacity="0.75">monthly, ABS Building Approvals · Mar 2026</text>
  </g>

  <!-- Card 3: Real wages -->
  <g transform="translate(64,680)">
    <rect width="464" height="200" rx="16" fill="#113a33" stroke="#165046"/>
    <text x="28" y="44" class="mono" font-size="13">REAL WAGES</text>
    <text x="28" y="124" class="metric" font-size="72" fill="#2dd4aa">▼ −1.2pp</text>
    <text x="28" y="158" class="body" font-size="17">3.4% wages vs 4.6% inflation — purchasing power down.</text>
    <text x="28" y="182" class="caption" font-size="13" opacity="0.75">latest quarter, ABS Wage Price Index</text>
  </g>

  <!-- Card 4: Household spending -->
  <g transform="translate(552,680)">
    <rect width="464" height="200" rx="16" fill="#113a33" stroke="#165046"/>
    <text x="28" y="44" class="mono" font-size="13">HOUSEHOLD SPENDING</text>
    <text x="28" y="124" class="metric" font-size="72" fill="#4df4d4">▲ +6.3%</text>
    <text x="28" y="158" class="body" font-size="17">Driven by fuel +32.8% — not discretionary spend.</text>
    <text x="28" y="182" class="caption" font-size="13" opacity="0.75">YoY, ABS Household Spending · Mar 2026</text>
  </g>

  <!-- ============== Comparison table (y 920..1240) ============== -->

  <text x="64" y="924" class="mono" font-size="14">NARRATIVE vs REALITY</text>

  <!-- header row -->
  <g transform="translate(64,940)">
    <rect width="464" height="36" rx="10" fill="#15473e"/>
    <text x="20" y="24" class="mono" font-size="12" fill="#a1e8d9">GOVERNMENT SAYS</text>

    <rect x="488" width="464" height="36" rx="10" fill="#15473e" stroke="#4dd4c6" stroke-width="1"/>
    <text x="508" y="24" class="mono" font-size="12" fill="#4dd4c6">ABS DATA SAYS</text>
  </g>

  <!-- row 1 -->
  <g transform="translate(64,990)">
    <text x="0"   y="22" class="h3" font-size="20">"Helping young buyers"</text>
    <text x="0"   y="50" class="body" font-size="16">…through long-term tax reform.</text>

    <text x="488" y="22" class="h3" font-size="20" fill="#4dd4c6">Borrowing capacity shrinking</text>
    <text x="488" y="50" class="body" font-size="16">as rates rise to fight inflation.</text>
  </g>
  <line x1="64" y1="1058" x2="1016" y2="1058" stroke="#165046" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- row 2 -->
  <g transform="translate(64,1078)">
    <text x="0"   y="22" class="h3" font-size="20">"Increasing housing supply"</text>
    <text x="0"   y="50" class="body" font-size="16">…via federal targets &amp; pipeline.</text>

    <text x="488" y="22" class="h3" font-size="20" fill="#4dd4c6">Approvals falling −10.5%</text>
    <text x="488" y="50" class="body" font-size="16">with sharp multi-unit pullback.</text>
  </g>
  <line x1="64" y1="1146" x2="1016" y2="1146" stroke="#165046" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- row 3 -->
  <g transform="translate(64,1166)">
    <text x="0"   y="22" class="h3" font-size="20">"Economy is resilient"</text>
    <text x="0"   y="50" class="body" font-size="16">…with strong nominal growth.</text>

    <text x="488" y="22" class="h3" font-size="20" fill="#4dd4c6">1.44M mortgages "at risk"</text>
    <text x="488" y="50" class="body" font-size="16">while real wages go backwards.</text>
  </g>

  <!-- footer -->
  <text x="540" y="1290" class="body" font-size="14" fill="#a1e8d9" opacity="0.7" text-anchor="middle">
    Sources: ABS CPI, Building Approvals, Wage Price Index &amp; Household Spending — March 2026 release
  </text>
  <text x="540" y="1314" class="caption" font-size="12" text-anchor="middle">blockscore.au · independent building &amp; market signal · 2026</text>
</svg>
