<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%"  stop-color="#113a33"/>
      <stop offset="55%" stop-color="#0d2e28"/>
      <stop offset="100%" stop-color="#0a231e"/>
    </radialGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0d8070"/>
      <stop offset="50%" stop-color="#2aa08a"/>
      <stop offset="100%" stop-color="#4dd4c6"/>
    </linearGradient>
    <linearGradient id="brandGradAnim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0d8070">
        <animate attributeName="stop-color" values="#0d8070;#2aa08a;#0d8070" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#2aa08a">
        <animate attributeName="stop-color" values="#2aa08a;#4dd4c6;#2aa08a" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4dd4c6">
        <animate attributeName="stop-color" values="#4dd4c6;#6ffce0;#4dd4c6" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <style>
      .h1   { font-family:'Inter Tight','Inter',system-ui,sans-serif; font-weight:500; letter-spacing:-0.035em; fill:#ffffff; }
      .h3   { font-family:'Inter Tight','Inter',system-ui,sans-serif; font-weight:500; letter-spacing:-0.015em; fill:#ffffff; }
      .body { font-family:'Inter','Inter Tight',system-ui,sans-serif; font-weight:400; letter-spacing:-0.003em; fill:#a1e8d9; }
      .mono { font-family:'Geist Mono','JetBrains Mono',ui-monospace,monospace; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; fill:#a1e8d9; }
      .metric { font-family:'Inter Tight',sans-serif; font-weight:500; letter-spacing:-0.04em; fill:#4dd4c6; }
      .emph { font-style:italic; fill:url(#brandGradAnim); }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- Decorative corner grid (top-right), pulses slowly -->
  <g transform="translate(960,72)" opacity="0">
    <animate attributeName="opacity" values="0;0.4" begin="0s" dur="0.8s" fill="freeze"/>
    <rect x="0"  y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="0"  y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="0"  y="32" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="32" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="32" width="10" height="10" rx="2" fill="#165046"/>
  </g>

  <!-- Wordmark + 3x3 mark (zone 1) -->
  <g transform="translate(64,72)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="64,88" to="64,72" begin="0.1s" dur="0.6s" fill="freeze"/>
    <g transform="scale(1.23)">
      <rect x="0"   y="0"   width="7" height="7" rx="1.6" fill="#165046"/>
      <rect x="9.5" y="0"   width="7" height="7" rx="1.6" fill="#165046"/>
      <rect x="19"  y="0"   width="7" height="7" rx="1.6" fill="#6ffce0"/>
      <rect x="0"   y="9.5" width="7" height="7" rx="1.6" fill="#165046"/>
      <rect x="9.5" y="9.5" width="7" height="7" rx="1.6" fill="#2dd4aa"/>
      <rect x="19"  y="9.5" width="7" height="7" rx="1.6" fill="#1a8a7d"/>
      <rect x="0"   y="19"  width="7" height="7" rx="1.6" fill="#2dd4aa"/>
      <rect x="9.5" y="19"  width="7" height="7" rx="1.6" fill="#6ffce0"/>
      <rect x="19"  y="19"  width="7" height="7" rx="1.6" fill="#4df4d4"/>
    </g>
    <text x="48" y="28" font-family="'Inter Tight',sans-serif" font-weight="700" font-size="26" letter-spacing="-0.02em">
      <tspan fill="#ffffff">Block</tspan><tspan fill="#4dd4c6">Score</tspan>
    </text>
  </g>

  <!-- Eyebrow (zone 1b) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.6s" fill="freeze"/>
    <text x="64" y="220" class="mono" font-size="18">LIVE OVERVIEW</text>
  </g>

  <!-- Headline (zone 2): "Anonymous feedback, one trusted score." -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.7s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0,16" to="0,0" begin="0.6s" dur="0.7s" fill="freeze"/>
    <text x="64" y="304" class="h1" font-size="76">Anonymous feedback,</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.7s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0,16" to="0,0" begin="1.1s" dur="0.7s" fill="freeze"/>
    <text x="64" y="384" class="h1" font-size="76">one <tspan class="emph">trusted score.</tspan></text>
  </g>

  <!-- Score gauge (zone 3) -->
  <g transform="translate(540,640)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.6s" fill="freeze"/>

    <!-- track -->
    <circle r="180" fill="none" stroke="#165046" stroke-width="14"/>

    <!-- progress arc: dasharray animates from 0 to 82 (out of pathLength=100) -->
    <circle r="180" fill="none" stroke="url(#brandGrad)" stroke-width="14"
            pathLength="100" stroke-linecap="round" transform="rotate(-90)"
            stroke-dasharray="0 100">
      <animate attributeName="stroke-dasharray"
               from="0 100" to="82 100"
               begin="1.6s" dur="1.6s" fill="freeze"
               calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </circle>

    <!-- numeric readout: stagger fades to fake count-up 0 -> 82 -->
    <g class="metric" font-size="140" text-anchor="middle">
      <text y="44" opacity="0"><animate attributeName="opacity" values="0;1;0" begin="1.6s" dur="0.25s" fill="remove"/>0</text>
      <text y="44" opacity="0"><animate attributeName="opacity" values="0;1;0" begin="1.85s" dur="0.25s" fill="remove"/>14</text>
      <text y="44" opacity="0"><animate attributeName="opacity" values="0;1;0" begin="2.10s" dur="0.25s" fill="remove"/>31</text>
      <text y="44" opacity="0"><animate attributeName="opacity" values="0;1;0" begin="2.35s" dur="0.25s" fill="remove"/>49</text>
      <text y="44" opacity="0"><animate attributeName="opacity" values="0;1;0" begin="2.60s" dur="0.25s" fill="remove"/>66</text>
      <text y="44" opacity="0"><animate attributeName="opacity" values="0;1;0" begin="2.85s" dur="0.20s" fill="remove"/>76</text>
      <text y="44" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="3.05s" dur="0.20s" fill="freeze"/>82</text>
    </g>
    <text y="100" class="body" font-size="22" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" from="0" to="0.85" begin="3.1s" dur="0.4s" fill="freeze"/>
      / 100 BlockScore
    </text>
  </g>

  <!-- Three stat cards (zone 4), staggered reveal -->
  <g transform="translate(64,920)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="64,940" to="64,920" begin="3.4s" dur="0.6s" fill="freeze"/>
    <rect width="296" height="180" rx="16" fill="#113a33" stroke="#165046"/>
    <text x="32" y="50" class="mono" font-size="14">RESPONSE RATE</text>
    <text x="148" y="120" class="metric" font-size="72" text-anchor="middle">87%</text>
    <text x="148" y="158" class="body" font-size="16" text-anchor="middle">avg participation</text>
  </g>

  <g transform="translate(392,940)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="392,940" to="392,920" begin="3.6s" dur="0.6s" fill="freeze"/>
    <rect width="296" height="180" rx="16" fill="#113a33" stroke="#165046"/>
    <text x="32" y="50" class="mono" font-size="14">SIGNALS</text>
    <text x="148" y="120" class="metric" font-size="72" text-anchor="middle">6</text>
    <text x="148" y="158" class="body" font-size="16" text-anchor="middle">weighted dimensions</text>
  </g>

  <g transform="translate(720,940)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="720,940" to="720,920" begin="3.8s" dur="0.6s" fill="freeze"/>
    <rect width="296" height="180" rx="16" fill="#15473e" stroke="url(#brandGrad)" stroke-width="2"/>
    <text x="32" y="50" class="mono" font-size="14">TIME TO INSIGHT</text>
    <text x="148" y="120" class="metric" font-size="64" text-anchor="middle">&lt;5min</text>
    <text x="148" y="158" class="body" font-size="16" text-anchor="middle">setup → first signal</text>
  </g>

  <!-- Pulsing accent dot near gauge (signature signal) -->
  <circle cx="540" cy="460" r="0" fill="#4dd4c6" opacity="0.6">
    <animate attributeName="r" values="0;14;0" begin="3.2s" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0" begin="3.2s" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- CTA + footer -->
  <g transform="translate(340,1180)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.1s" dur="0.6s" fill="freeze"/>
    <rect width="400" height="72" rx="36" fill="#4dd4c6"/>
    <text x="200" y="48" font-family="'Inter Tight',sans-serif" font-weight="500" font-size="24" text-anchor="middle" fill="#0d2e28">Get your score →</text>
  </g>

  <text x="540" y="1306" class="body" font-size="16" opacity="0" text-anchor="middle">
    <animate attributeName="opacity" from="0" to="0.7" begin="4.4s" dur="0.6s" fill="freeze"/>
    blockscore.au · anonymous tenant feedback
  </text>
</svg>
