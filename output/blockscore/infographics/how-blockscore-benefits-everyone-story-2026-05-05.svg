<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="20%" r="100%">
      <stop offset="0%"  stop-color="#113a33"/>
      <stop offset="55%" stop-color="#0d2e28"/>
      <stop offset="100%" stop-color="#0a231e"/>
    </radialGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0d8070"/>
      <stop offset="50%" stop-color="#2aa08a"/>
      <stop offset="100%" stop-color="#4dd4c6"/>
    </linearGradient>
    <style>
      .h1     { font-family:'Inter Tight','Inter',system-ui,sans-serif; font-weight:500; letter-spacing:-0.035em; fill:#ffffff; }
      .h2     { font-family:'Inter Tight','Inter',system-ui,sans-serif; font-weight:500; letter-spacing:-0.025em; fill:#ffffff; }
      .body   { font-family:'Inter','Inter Tight',system-ui,sans-serif; font-weight:400; letter-spacing:-0.003em; fill:#a1e8d9; }
      .mono   { font-family:'Geist Mono','JetBrains Mono',ui-monospace,monospace; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; fill:#a1e8d9; }
      .metric { font-family:'Inter Tight',sans-serif; font-weight:500; letter-spacing:-0.04em; }
      .emph   { font-style:italic; fill:url(#brandGrad); }
      .cta    { font-family:'Inter Tight',sans-serif; font-weight:500; fill:#0d2e28; letter-spacing:-0.02em; }
      .role   { font-family:'Inter Tight',sans-serif; font-weight:500; fill:#0d2e28; letter-spacing:-0.02em; }
    </style>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- decorative corner grid (top-right, inside safe area) -->
  <g transform="translate(960,260)" opacity="0.35">
    <rect x="0"  y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="0"  width="10" height="10" rx="2" fill="#165046"/>
    <rect x="0"  y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="16" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="0"  y="32" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="16" y="32" width="10" height="10" rx="2" fill="#165046"/>
    <rect x="32" y="32" width="10" height="10" rx="2" fill="#165046"/>
  </g>

  <!-- ZONE 1: brand (y 240, inside top safe area boundary 220) -->
  <g transform="translate(72,260) scale(1.5)">
    <rect x="0"   y="0"   width="7" height="7" rx="1.6" fill="#165046"/>
    <rect x="9.5" y="0"   width="7" height="7" rx="1.6" fill="#165046"/>
    <rect x="19"  y="0"   width="7" height="7" rx="1.6" fill="#6ffce0"/>
    <rect x="0"   y="9.5" width="7" height="7" rx="1.6" fill="#165046"/>
    <rect x="9.5" y="9.5" width="7" height="7" rx="1.6" fill="#2dd4aa"/>
    <rect x="19"  y="9.5" width="7" height="7" rx="1.6" fill="#1a8a7d"/>
    <rect x="0"   y="19"  width="7" height="7" rx="1.6" fill="#2dd4aa"/>
    <rect x="9.5" y="19"  width="7" height="7" rx="1.6" fill="#6ffce0"/>
    <rect x="19"  y="19"  width="7" height="7" rx="1.6" fill="#4df4d4"/>
  </g>
  <text x="128" y="298" font-family="'Inter Tight',sans-serif" font-weight="700" font-size="30" letter-spacing="-0.02em">
    <tspan fill="#ffffff">Block</tspan><tspan fill="#4dd4c6">Score</tspan>
  </text>

  <!-- ZONE 2: hook (y 400-720) -->
  <text x="72" y="430" class="mono" font-size="22">WHO BENEFITS</text>
  <text x="72" y="540" class="h1" font-size="100">Everyone</text>
  <text x="72" y="640" class="h1" font-size="100">wins when</text>
  <text x="72" y="740" class="h1" font-size="100"><tspan class="emph">buildings</tspan> do.</text>

  <!-- ZONE 3: 3 stacked stakeholder cards (y 820 - 1420) -->

  <!-- Card 1: Tenants -->
  <g transform="translate(72,820)">
    <rect width="936" height="180" rx="20" fill="#113a33" stroke="#165046" stroke-width="1"/>
    <circle cx="84" cy="90" r="44" fill="#4dd4c6"/>
    <text x="84" y="103" class="role" font-size="40" text-anchor="middle">T</text>
    <text x="160" y="74" class="mono" font-size="16" fill="#a1e8d9">TENANTS</text>
    <text x="160" y="120" class="h2" font-size="34">Anonymous voice.</text>
    <text x="160" y="156" class="body" font-size="22">Real credit. Zero retaliation.</text>
    <text x="900" y="100" class="metric" font-size="68" fill="#4dd4c6" text-anchor="end">$29</text>
    <text x="900" y="138" class="mono" font-size="14" text-anchor="end">PER SURVEY</text>
  </g>

  <!-- Card 2: Owners / Strata -->
  <g transform="translate(72,1020)">
    <rect width="936" height="180" rx="20" fill="#113a33" stroke="#165046" stroke-width="1"/>
    <circle cx="84" cy="90" r="44" fill="#2dd4aa"/>
    <text x="84" y="103" class="role" font-size="40" text-anchor="middle">O</text>
    <text x="160" y="74" class="mono" font-size="16" fill="#a1e8d9">OWNERS &amp; STRATA</text>
    <text x="160" y="120" class="h2" font-size="34">Six signals.</text>
    <text x="160" y="156" class="body" font-size="22">One trusted quarterly score.</text>
    <text x="900" y="110" class="metric" font-size="92" fill="#2dd4aa" text-anchor="end">6</text>
    <text x="900" y="148" class="mono" font-size="14" text-anchor="end">DIMENSIONS</text>
  </g>

  <!-- Card 3: Buyers / Investors (highlight with gradient border) -->
  <g transform="translate(72,1220)">
    <rect width="936" height="180" rx="20" fill="#15473e" stroke="url(#brandGrad)" stroke-width="2"/>
    <circle cx="84" cy="90" r="44" fill="#6ffce0"/>
    <text x="84" y="103" class="role" font-size="40" text-anchor="middle">B</text>
    <text x="160" y="74" class="mono" font-size="16" fill="#a1e8d9">BUYERS &amp; INVESTORS</text>
    <text x="160" y="120" class="h2" font-size="34">Compare before you sign.</text>
    <text x="160" y="156" class="body" font-size="22">Independent. National. Trended.</text>
    <text x="900" y="100" class="metric" font-size="56" fill="#6ffce0" text-anchor="end">368K+</text>
    <text x="900" y="138" class="mono" font-size="14" text-anchor="end">BUILDINGS</text>
  </g>

  <!-- ZONE 4: punch line (y 1470) -->
  <text x="540" y="1490" class="h2" font-size="36" text-anchor="middle">And <tspan class="emph">$4.2M</tspan> recycled into buildings.</text>

  <!-- ZONE 5: CTA + URL (must end inside y 1620 safe area) -->
  <g transform="translate(290,1530)">
    <rect width="500" height="84" rx="42" fill="#4dd4c6"/>
    <text x="250" y="56" class="cta" font-size="30" text-anchor="middle">Get your score →</text>
  </g>
  <text x="540" y="1640" class="body" font-size="22" opacity="0.75" text-anchor="middle">blockscore.au · anonymous tenant feedback</text>
</svg>
